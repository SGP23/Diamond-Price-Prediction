name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports
        run: python -c "from src.DiamondPricePrediction.pipelines.Training_pipeline import TrainingPipeline; print('Imports OK')"

      - name: Run training pipeline
        run: python main.py --train

      - name: Verify artifacts
        run: |
          test -f Artifacts/model.pkl
          test -f Artifacts/preprocessor.pkl
          test -f Artifacts/final_model_metrics.json
          echo "All artifacts present"
